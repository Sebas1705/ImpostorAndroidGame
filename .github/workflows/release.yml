name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without prefix, for example 2026.05.1"
        required: true
        type: string
permissions:
  contents: write
  pull-requests: read
jobs:
  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve Tag
        id: tag
        shell: bash
        run: |
          git fetch origin --tags --quiet
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
            if [[ "$RAW" == v* ]]; then
              TAG="$RAW"
            else
              TAG="v$RAW"
            fi
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
              echo "Tag $TAG already exists on origin."
              echo "defer_to_push=false" >> "$GITHUB_OUTPUT"
            else
              git tag "$TAG"
              git push origin "$TAG"
              echo "defer_to_push=true" >> "$GITHUB_OUTPUT"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "defer_to_push=false" >> "$GITHUB_OUTPUT"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
      - name: Validate Tag Format
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if [[ ! "$TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected format: vYYYY.MM.PATCH"
            exit 1
          fi
      - name: Wait for tag-push workflow when dispatch created the tag
        if: steps.tag.outputs.defer_to_push == 'true'
        shell: bash
        run: |
          echo "Tag ${{ steps.tag.outputs.value }} was pushed during workflow_dispatch."
          echo "The tag-push triggered release workflow will continue the publish flow."
      - name: Verify Tag Commit Is On Main
        if: steps.tag.outputs.defer_to_push != 'true'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          git fetch origin main --quiet
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag commit belongs to main history."
          else
            echo "Tag commit is not reachable from origin/main."
            exit 1
          fi
      - name: Determine Previous Tag
        if: steps.tag.outputs.defer_to_push != 'true'
        id: previous_tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          PREVIOUS_TAG=$(git for-each-ref --sort=-version:refname --format='%(refname:short)' refs/tags | grep -Fxv "$TAG" | head -n 1 || true)
          echo "value=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREVIOUS_TAG:-<none>}"
      - name: Generate Release Notes
        if: steps.tag.outputs.defer_to_push != 'true'
        id: release_notes
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.tag.outputs.value }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.value }}
        with:
          result-encoding: string
          script: |
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              target_commitish: 'main',
            };
            if (process.env.PREVIOUS_TAG) {
              params.previous_tag_name = process.env.PREVIOUS_TAG;
            }
            const { data } = await github.rest.repos.generateReleaseNotes(params);
            return data.body;
      - name: Persist Release Notes
        if: steps.tag.outputs.defer_to_push != 'true'
        shell: bash
        run: |
          cat <<'EOF' > .release-notes.md
          ${{ steps.release_notes.outputs.result }}
          EOF
      - name: Prepare Main Branch For CHANGELOG Update
        if: steps.tag.outputs.defer_to_push != 'true'
        shell: bash
        run: |
          git fetch origin main --quiet
          git checkout main
          git pull --ff-only origin main
      - name: Update CHANGELOG.md
        if: steps.tag.outputs.defer_to_push != 'true'
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag.outputs.value }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          from datetime import datetime, timezone
          changelog_path = Path('CHANGELOG.md')
          tag = os.environ['TAG_NAME']
          notes = Path('.release-notes.md').read_text(encoding='utf-8').strip()
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          entry = f"## [{tag}] - {today}\n\n{notes}\n\n"
          unreleased = "## [Unreleased]\n\n- Changelog entries are generated automatically from merged PR labels during release publishing.\n\n"
          existing = changelog_path.read_text(encoding='utf-8')
          if f"## [{tag}] - " in existing:
            print(f"CHANGELOG already contains {tag}; skipping update.")
            raise SystemExit(0)
          pattern = re.compile(r"## \[Unreleased\].*?(?=\n## \[|\Z)", re.DOTALL)
          if pattern.search(existing):
            updated = pattern.sub(unreleased.rstrip(), existing, count=1)
          else:
            updated = existing.rstrip() + "\n\n" + unreleased.rstrip() + "\n"
          marker = unreleased.rstrip()
          updated = updated.replace(marker, marker + "\n\n" + entry.rstrip(), 1)
          changelog_path.write_text(updated.rstrip() + "\n", encoding='utf-8')
          PY
      - name: Commit CHANGELOG.md
        if: steps.tag.outputs.defer_to_push != 'true'
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag.outputs.value }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update ${TAG_NAME} release notes"
          git push origin HEAD:main
      - name: Publish GitHub Release
        if: steps.tag.outputs.defer_to_push != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          body_path: .release-notes.md

