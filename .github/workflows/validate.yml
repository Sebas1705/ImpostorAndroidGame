name: Validation Pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      detekt: ${{ steps.filter.outputs.detekt }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'app/**'
              - 'feature/**'
              - 'core/**'
              - 'domain/**'
              - 'data/**'
              - 'build-logic/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - '.github/workflows/validate.yml'
            detekt:
              - 'app/**'
              - 'feature/**'
              - 'core/**'
              - 'domain/**'
              - 'data/**'
              - 'build-logic/**'
              - 'config/detekt/**'
              - '.github/workflows/validate.yml'
            tests:
              - 'app/**'
              - 'feature/**'
              - 'core/**'
              - 'domain/**'
              - 'data/**'
              - '.github/workflows/validate.yml'
  build_lint:
    name: Build + Lint
    needs: changes
    if: needs.changes.outputs.android == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Create secrets file
        run: |
          mkdir -p app
          echo "signing_keystore_password=fake" > app/secrets.properties
          echo "signing_key_alias=fake" >> app/secrets.properties
          echo "EXAMPLE_URL_DEV=${{ secrets.EXAMPLE_URL_DEV || 'https://dev.example.com' }}" >> app/secrets.properties
          echo "EXAMPLE_URL_PRO=${{ secrets.EXAMPLE_URL_PRO || 'https://pro.example.com' }}" >> app/secrets.properties
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build and Lint
        run: ./gradlew assembleDebug lintDebug --stacktrace --no-daemon --build-cache
      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          retention-days: 14
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
  detekt:
    name: Detekt
    needs: changes
    if: needs.changes.outputs.detekt == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Create secrets file
        run: |
          mkdir -p app
          echo "signing_keystore_password=fake" > app/secrets.properties
          echo "signing_key_alias=fake" >> app/secrets.properties
          echo "EXAMPLE_URL_DEV=${{ secrets.EXAMPLE_URL_DEV || 'https://dev.example.com' }}" >> app/secrets.properties
          echo "EXAMPLE_URL_PRO=${{ secrets.EXAMPLE_URL_PRO || 'https://pro.example.com' }}" >> app/secrets.properties
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Detekt
        run: ./gradlew detekt --stacktrace --no-daemon --build-cache --configuration-cache
      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          retention-days: 14
          path: |
            **/build/reports/detekt/
  unit_tests:
    name: Unit Tests + Coverage
    needs: changes
    if: needs.changes.outputs.tests == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Create secrets file
        run: |
          mkdir -p app
          echo "signing_keystore_password=fake" > app/secrets.properties
          echo "signing_key_alias=fake" >> app/secrets.properties
          echo "EXAMPLE_URL_DEV=${{ secrets.EXAMPLE_URL_DEV || 'https://dev.example.com' }}" >> app/secrets.properties
          echo "EXAMPLE_URL_PRO=${{ secrets.EXAMPLE_URL_PRO || 'https://pro.example.com' }}" >> app/secrets.properties
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Unit Tests and Coverage
        run: ./gradlew coverageUnitTestAll --stacktrace --no-daemon --build-cache
      - name: Upload Test and Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-reports
          retention-days: 14
          path: |
            **/build/reports/tests/
            **/build/reports/jacoco/
