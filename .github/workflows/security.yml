name: Security
on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      security: ${{ steps.filter.outputs.security }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            security:
              - 'AndroidModApp/**'
              - '.github/workflows/security.yml'
  dependency_review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
  codeql:
    name: CodeQL
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: AndroidModApp
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
      - name: Create placeholder secrets
        run: |
          mkdir -p app
          echo "signing_keystore_password=fake" > app/secrets.properties
          echo "signing_key_alias=fake" >> app/secrets.properties
          echo "EXAMPLE_URL_DEV=https://dev.example.com" >> app/secrets.properties
          echo "EXAMPLE_URL_PRO=https://pro.example.com" >> app/secrets.properties
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build for CodeQL
        run: ./gradlew :app:assembleDebug --no-daemon --build-cache --stacktrace -x lint -x test
      - name: Check Code Scanning Availability
        id: code_scanning
        run: |
          STATUS_CODE=$(curl -s -o /tmp/code_scanning_response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "$STATUS_CODE" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning API unavailable (HTTP $STATUS_CODE). Skipping CodeQL analyze upload."
          fi
      - name: Analyze
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4
      - name: Skip Analyze (Code Scanning Disabled)
        if: steps.code_scanning.outputs.enabled != 'true'
        run: echo "Code scanning is disabled for this repository. Enable it in repository settings to upload CodeQL results."
