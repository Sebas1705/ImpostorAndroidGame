name: dependency-report-monthly

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create secrets file
        run: |
          mkdir -p app
          echo "signing_keystore_password=fake" > app/secrets.properties
          echo "signing_key_alias=fake" >> app/secrets.properties
          echo "EXAMPLE_URL_DEV=${{ secrets.EXAMPLE_URL_DEV || 'https://dev.example.com' }}" >> app/secrets.properties
          echo "EXAMPLE_URL_PRO=${{ secrets.EXAMPLE_URL_PRO || 'https://pro.example.com' }}" >> app/secrets.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate dependency report
        run: ./gradlew dependencyUpdates --no-parallel --no-daemon

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-updates-report
          path: build/dependencyUpdates/report.txt
